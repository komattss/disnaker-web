<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <title>Lowongan Kerja - Disnaker</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/utils.js"></script>
  <script src="/data/seed.js"></script>
  <script src="/js/database.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/recommendation.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/verification.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = Auth.getCurrentUser();

      function render() {
        const jobs = DB.getVerifiedJobs();

        // ── Recommendation section for logged-in users ──
        let recommendationHtml = '';
        if (user && user.role === 'user') {
          const applications = DB.getApplications();
          const recommended = Recommendation.getRecommendedJobs(user, jobs, applications).slice(0, 8);
          if (recommended.length > 0) {
            const recCards = recommended.map((j, idx) => {
              j._idx = idx;
              return Components.renderJobCardWithMatch(j, j.matchScore);
            }).join('');
            recommendationHtml = `
              <div class="recommendation-section">
                <div class="section-header">
                  <div>
                    <h2><i class="fas fa-wand-magic-sparkles"></i> Rekomendasi untuk Anda</h2>
                    <p class="section-subtitle">Berdasarkan skill, pendidikan, dan pengalaman Anda</p>
                  </div>
                </div>
                <div class="recommendation-scroll">${recCards}</div>
              </div>
            `;
          }
        }

        const filterHtml = `
          <div class="filter-panel">
            <h3><i class="fas fa-filter"></i> Filter</h3>
            <div class="filter-section">
              <label>Kata Kunci</label>
              <input type="text" class="form-control" id="f-keyword" placeholder="Cari posisi, perusahaan..." oninput="applyFilters()">
            </div>
            <div class="filter-section">
              <label>Lokasi</label>
              <select class="form-control" id="f-location" onchange="applyFilters()">
                <option value="all">Semua Lokasi</option>
                ${Utils.locations.map(l => `<option value="${l}">${l}</option>`).join('')}
              </select>
            </div>
            <div class="filter-section">
              <label>Kategori</label>
              <select class="form-control" id="f-category" onchange="applyFilters()">
                <option value="all">Semua Kategori</option>
                ${Utils.categories.map(c => `<option value="${c}">${c}</option>`).join('')}
              </select>
            </div>
            <div class="filter-section">
              <label>Tipe Perusahaan</label>
              <select class="form-control" id="f-companyType" onchange="applyFilters()">
                <option value="all">Semua</option>
                <option value="swasta">Swasta</option>
                <option value="bumn">BUMN</option>
              </select>
            </div>
            <div class="filter-section">
              <label>Pendidikan</label>
              <select class="form-control" id="f-education" onchange="applyFilters()">
                <option value="all">Semua</option>
                ${Utils.educationLevels.map(e => `<option value="${e}">${e}</option>`).join('')}
              </select>
            </div>
            <div class="filter-section">
              <label>Gaji Minimum</label>
              <select class="form-control" id="f-salary" onchange="applyFilters()">
                <option value="">Semua</option>
                <option value="3000000">≥ Rp 3.000.000</option>
                <option value="5000000">≥ Rp 5.000.000</option>
                <option value="8000000">≥ Rp 8.000.000</option>
                <option value="10000000">≥ Rp 10.000.000</option>
                <option value="15000000">≥ Rp 15.000.000</option>
              </select>
            </div>
            <button class="btn btn-outline btn-block btn-sm" onclick="resetFilters()"><i class="fas fa-undo"></i> Reset Filter</button>
          </div>
        `;

        const content = `
          <div class="page-header">
            <h1><i class="fas fa-briefcase" style="color:var(--primary-500);margin-right:var(--space-3)"></i> Lowongan Kerja</h1>
            <p>Temukan lowongan kerja terverifikasi</p>
          </div>
          ${recommendationHtml}
          <div class="content-grid">
            ${filterHtml}
            <div>
              <div class="flex-between mb-4">
                <span style="font-size:var(--font-size-sm);color:var(--text-secondary);" id="result-count">${jobs.length} lowongan ditemukan</span>
                <select class="form-control" id="f-sort" style="width:auto;" onchange="applyFilters()">
                  <option value="newest">Terbaru</option>
                  <option value="salary-high">Gaji Tertinggi</option>
                  <option value="salary-low">Gaji Terendah</option>
                  <option value="title">Judul A-Z</option>
                </select>
              </div>
              <div class="jobs-grid" id="jobs-container"></div>
              <div id="empty-state" style="display:none;">
                <div class="empty-state">
                  <div class="empty-icon"><i class="fas fa-search"></i></div>
                  <h3>Tidak ada lowongan ditemukan</h3>
                  <p>Coba ubah filter pencarian Anda.</p>
                </div>
              </div>
            </div>
          </div>
        `;

        Components.renderLayout('jobs', 'Lowongan Kerja', content);
        applyFilters();
      }

      window.applyFilters = function() {
        const filters = {
          keyword: document.getElementById('f-keyword')?.value,
          location: document.getElementById('f-location')?.value,
          category: document.getElementById('f-category')?.value,
          education: document.getElementById('f-education')?.value,
          salaryMin: document.getElementById('f-salary')?.value,
          companyType: document.getElementById('f-companyType')?.value
        };
        const sortBy = document.getElementById('f-sort')?.value || 'newest';

        let jobs = DB.getVerifiedJobs();
        jobs = Search.filterJobs(jobs, filters);
        jobs = Search.sortJobs(jobs, sortBy);
        const container = document.getElementById('jobs-container');
        const empty = document.getElementById('empty-state');
        if (!container) return;
        if (jobs.length === 0) {
          container.innerHTML = '';
          empty.style.display = 'block';
        } else {
          empty.style.display = 'none';
          container.innerHTML = jobs.map(j => Components.renderJobCard(j)).join('');
        }
        document.getElementById('result-count').textContent = `${jobs.length} lowongan ditemukan`;
      };

      window.resetFilters = function() {
        ['f-keyword','f-location','f-category','f-education','f-salary','f-companyType'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = el.tagName === 'SELECT' ? (el.querySelector('option')?.value || '') : '';
        });
        applyFilters();
      };

      render();
    });
  </script>
</body>
</html>
