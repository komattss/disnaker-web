<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <title>Lamaran Saya - Disnaker</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/utils.js"></script>
  <script src="/data/seed.js"></script>
  <script src="/js/database.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/verification.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.requireAuth(['user'])) return;
      const user = Auth.getCurrentUser();
      const apps = DB.getApplicationsByUser(user.id);

      const statusMap = { pending: { label: 'Menunggu', badge: 'badge-warning' }, reviewed: { label: 'Ditinjau', badge: 'badge-info' }, accepted: { label: 'Diterima', badge: 'badge-success' }, rejected: { label: 'Ditolak', badge: 'badge-danger' } };

      let tableHtml = '';
      if (apps.length === 0) {
        tableHtml = Components.renderEmptyState({ icon: 'fa-file-alt', title: 'Belum ada lamaran', description: 'Mulai cari dan lamar pekerjaan yang sesuai dengan profil Anda.', ctaText: 'Cari Lowongan', ctaHref: '/pages/jobs.html', ctaIcon: 'fa-briefcase' });
      } else {
        tableHtml = `
          <div class="table-container">
            <table class="table">
              <thead><tr><th>Posisi</th><th>Perusahaan</th><th>Lokasi</th><th>Gaji</th><th>Status</th><th>Tanggal Lamar</th><th>Aksi</th></tr></thead>
              <tbody>
                ${apps.map(a => {
                  const job = DB.getJobById(a.jobId);
                  if (!job) return '';
                  const s = statusMap[a.status] || statusMap.pending;
                  return `<tr>
                    <td><strong>${Utils.escapeHtml(job.title)}</strong></td>
                    <td>${Utils.escapeHtml(job.company)}</td>
                    <td><i class="fas fa-map-marker-alt" style="color:var(--gray-500);margin-right:4px;"></i>${Utils.escapeHtml(job.location)}</td>
                    <td>${Utils.salaryRange(job.salaryMin, job.salaryMax)}</td>
                    <td><span class="badge ${s.badge}" role="status" aria-label="Status: ${s.label}">${s.label}</span></td>
                    <td>${Utils.formatDateShort(a.appliedAt)}</td>
                    <td><a href="/pages/job-detail.html?id=${job.id}" class="btn btn-ghost btn-sm"><i class="fas fa-eye"></i></a></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      const content = `
        <div class="page-header">
          <h1><i class="fas fa-file-alt" style="color:var(--primary-500);margin-right:var(--space-3)"></i> Lamaran Saya</h1>
          <p>Daftar semua lowongan yang telah Anda lamar</p>
        </div>
        <div class="stats-grid" style="margin-bottom:var(--space-6)">
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-paper-plane"></i></div><div class="stat-info"><h3>${apps.length}</h3><p>Total Lamaran</p></div></div>
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-info"><h3>${apps.filter(a=>a.status==='pending').length}</h3><p>Menunggu</p></div></div>
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-eye"></i></div><div class="stat-info"><h3>${apps.filter(a=>a.status==='reviewed').length}</h3><p>Ditinjau</p></div></div>
          <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-info"><h3>${apps.filter(a=>a.status==='accepted').length}</h3><p>Diterima</p></div></div>
        </div>
        ${tableHtml}
      `;
      Components.renderLayout('my-applications', 'Lamaran Saya', content);
    });
  </script>
</body>
</html>
