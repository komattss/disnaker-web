<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <title>Detail Lowongan - Disnaker</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/utils.js"></script>
  <script src="/data/seed.js"></script>
  <script src="/js/database.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/verification.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const jobId = Utils.getUrlParam('id');
      const job = DB.getJobById(jobId);
      const user = Auth.getCurrentUser();

      if (!job) {
        Components.renderLayout('jobs', 'Tidak Ditemukan', `<div class="empty-state"><div class="empty-icon"><i class="fas fa-search"></i></div><h3>Lowongan tidak ditemukan</h3><p>Lowongan mungkin telah dihapus atau ID salah.</p><a href="/pages/jobs.html" class="btn btn-primary">Kembali ke Daftar</a></div>`);
        return;
      }

      const initials = Utils.getInitials(job.company);
      const salary = Utils.salaryRange(job.salaryMin, job.salaryMax);
      const hasApplied = user ? DB.hasApplied(user.id, job.id) : false;
      const appCount = DB.getApplicationsByJob(job.id).length;

      const statusBadge = `<span class="verified-badge ${job.status}">${job.status === 'verified' ? '<i class="fas fa-check-circle"></i> Terverifikasi' : job.status === 'pending' ? '<i class="fas fa-clock"></i> Menunggu Verifikasi' : '<i class="fas fa-times-circle"></i> Ditolak'}</span>`;

      let actionBtn = '';
      if (user && user.role === 'user' && job.status === 'verified') {
        if (hasApplied) {
          actionBtn = `<button class="btn btn-outline btn-lg" disabled><i class="fas fa-check"></i> Sudah Dilamar</button>`;
        } else {
          actionBtn = `<button class="btn btn-primary btn-lg" onclick="applyJob('${job.id}')"><i class="fas fa-paper-plane"></i> Lamar Sekarang</button>`;
        }
      } else if (!user) {
        actionBtn = `<a href="/pages/login.html" class="btn btn-primary btn-lg"><i class="fas fa-sign-in-alt"></i> Masuk untuk Melamar</a>`;
      }

      const content = `
        <a href="/pages/jobs.html" class="btn btn-ghost mb-4"><i class="fas fa-arrow-left"></i> Kembali</a>

        <div class="job-detail-header">
          <div class="job-detail-logo">${initials}</div>
          <div class="job-detail-info" style="flex:1">
            <div style="display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap">
              <h1>${Utils.escapeHtml(job.title)}</h1>
              ${statusBadge}
            </div>
            <p style="font-size:var(--font-size-md);color:var(--text-secondary);margin-top:var(--space-1)">${Utils.escapeHtml(job.company)}</p>
            <div class="job-detail-meta">
              <span class="job-detail-meta-item"><i class="fas fa-map-marker-alt"></i> ${Utils.escapeHtml(job.location)}</span>
              <span class="job-detail-meta-item"><i class="fas fa-folder"></i> ${Utils.escapeHtml(job.category)}</span>
              <span class="job-detail-meta-item"><i class="fas fa-clock"></i> ${job.type || 'Full-time'}</span>
              <span class="job-detail-meta-item"><i class="fas fa-money-bill-wave"></i> ${salary}</span>
              <span class="job-detail-meta-item"><i class="fas fa-calendar"></i> ${Utils.formatDate(job.createdAt)}</span>
            </div>
            <div class="job-detail-actions">${actionBtn}</div>
          </div>
        </div>

        <div class="job-detail-body">
          <div class="job-detail-main">
            <div class="job-detail-section">
              <h2><i class="fas fa-file-alt" style="color:var(--primary-500);margin-right:var(--space-2)"></i> Deskripsi</h2>
              <p>${Utils.escapeHtml(job.description)}</p>
            </div>
            <div class="job-detail-section">
              <h2><i class="fas fa-list-check" style="color:var(--accent-500);margin-right:var(--space-2)"></i> Persyaratan</h2>
              <ul>${(job.requirements || []).map(r => `<li>${Utils.escapeHtml(r)}</li>`).join('')}</ul>
            </div>
            <div class="job-detail-section">
              <h2><i class="fas fa-gift" style="color:var(--success);margin-right:var(--space-2)"></i> Benefit</h2>
              <ul>${(job.benefits || []).map(b => `<li>${Utils.escapeHtml(b)}</li>`).join('')}</ul>
            </div>
          </div>
          <div class="job-detail-sidebar">
            <div class="job-detail-section">
              <h2>Informasi Lowongan</h2>
              <div style="display:grid;gap:var(--space-4);">
                <div><span style="font-size:var(--font-size-xs);color:var(--text-muted);text-transform:uppercase;">Pendidikan</span><br><strong>${job.education || '-'}</strong></div>
                <div><span style="font-size:var(--font-size-xs);color:var(--text-muted);text-transform:uppercase;">Pengalaman</span><br><strong>${job.experience ? job.experience + ' tahun' : 'Fresh Graduate'}</strong></div>
                <div><span style="font-size:var(--font-size-xs);color:var(--text-muted);text-transform:uppercase;">Gaji</span><br><strong style="color:var(--primary-600)">${salary}</strong></div>
                <div><span style="font-size:var(--font-size-xs);color:var(--text-muted);text-transform:uppercase;">Pelamar</span><br><strong>${appCount} orang</strong></div>
              </div>
            </div>
            <div class="job-detail-section">
              <h2>Keahlian Dibutuhkan</h2>
              <div style="display:flex;flex-wrap:wrap;gap:var(--space-2);">${(job.skills || []).map(s => `<span class="tag">${Utils.escapeHtml(s)}</span>`).join('')}</div>
            </div>
            ${job.status === 'rejected' && job.rejectionReason ? `
              <div class="job-detail-section" style="border-color:var(--danger);">
                <h2 style="color:var(--danger);"><i class="fas fa-times-circle"></i> Alasan Penolakan</h2>
                <p>${Utils.escapeHtml(job.rejectionReason)}</p>
              </div>
            ` : ''}
          </div>
        </div>
      `;

      Components.renderLayout('jobs', job.title, content);
    });

    function applyJob(jobId) {
      const user = Auth.getCurrentUser();
      if (!user) { window.location.href = '/pages/login.html'; return; }
      Components.showDialog({
        type: 'question', title: 'Lamar Pekerjaan?',
        text: 'Apakah Anda yakin ingin melamar posisi ini? Pastikan profil Anda sudah lengkap.',
        confirmText: 'Ya, Lamar', cancelText: 'Batal',
        onConfirm: () => {
          DB.createApplication({ userId: user.id, jobId, coverLetter: '' });
          Components.showAlert('success', 'Berhasil!', 'Lamaran Anda telah terkirim.');
          setTimeout(() => location.reload(), 1500);
        }
      });
    }
  </script>
</body>
</html>
